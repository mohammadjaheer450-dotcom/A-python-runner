<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sigma Python Pro</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    <style>
        body { font-family: sans-serif; background: #1e1e1e; color: #fff; margin: 0; padding: 20px; }
        textarea { width: 100%; height: 60vh; background: #2d2d2d; color: #00ff00; padding: 15px; border: none; border-radius: 8px; font-family: monospace; font-size: 16px; }
        button { width: 100%; padding: 15px; margin-top: 10px; background: #007bff; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 8px; }
        #output { background: #000; padding: 15px; margin-top: 10px; border-radius: 8px; min-height: 50px; color: #fff; white-space: pre-wrap; }
    </style>
</head>
<body>

    <h2>Sigma Python Pro 🐍</h2>
    <textarea id="code" placeholder="Python code yahan likho..."></textarea>
    <button onclick="runCode()">RUN CODE</button>
    <div id="output">Output yahan aayega...</div>

    <script>
        let pyodideReadyPromise = loadPyodide();
        async function runCode() {
            let output = document.getElementById("output");
            output.innerText = "Running...";
            let pyodide = await pyodideReadyPromise;
            try {
                let code = document.getElementById("code").value;
                let result = await pyodide.runPythonAsync(code);
                output.innerText = result;
            } catch (err) {
                output.innerText = err;
            }
        }
    </script>
</body>
</html>
