<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sigma Python Pro</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    <style>
        body { background: #121212; color: #fff; padding: 20px; font-family: sans-serif; }
        textarea { width: 100%; height: 40vh; background: #222; color: #0f0; border: 1px solid #555; padding: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin: 10px 0; background: #28a745; border: none; color: #fff; font-weight: bold; cursor: pointer; }
        #output { border: 1px solid #555; padding: 10px; min-height: 50px; background: #000; color: #fff; white-space: pre-wrap; }
    </style>
</head>
<body>

    <h2>Sigma Python Pro 🐍</h2>
    <textarea id="code" placeholder="Python code yahan likho..."></textarea>
    <button id="runBtn" onclick="runCode()" disabled>Loading Python...</button>
    <div id="output">Output yahan aayega...</div>

    <script>
        let pyodide;
        async function init() {
            pyodide = await loadPyodide();
            let btn = document.getElementById("runBtn");
            btn.innerText = "RUN CODE";
            btn.disabled = false;
        }
        init();

        async function runCode() {
            let code = document.getElementById("code").value;
            let output = document.getElementById("output");
            output.innerText = "Running...";
            
            try {
                await pyodide.runPythonAsync(`
import sys
import io
sys.stdout = io.StringIO()
                `);
                await pyodide.runPythonAsync(code);
                output.innerText = await pyodide.runPythonAsync("sys.stdout.getvalue()");
            } catch (err) {
                output.innerText = err;
            }
        }
    </script>
</body>
</html>
